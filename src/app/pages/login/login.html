<div class="login-page">
  <div class="login-card">
    <h1>Book Worm</h1>
    <p>{{ isRegistering ? 'Create an account to get started.' : 'Log in to view your profile, library, friends, and reviews.' }}</p>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

    <form (ngSubmit)="isRegistering ? onRegister() : onLogin()">

      <div class="form-group" *ngIf="isRegistering">
        <label for="username">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          placeholder="Choose a username"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit">{{ isRegistering ? 'Register' : 'Log In' }}</button>

    </form>

    <button class="toggle-btn" type="button" (click)="toggleMode()">
      {{ isRegistering ? 'Already have an account? Log in' : "Don't have an account? Register" }}
    </button>
  </div>
</div>
