<div class="profile-page" *ngIf="currentUser">
  <header class="content-header">
    <div class="profile-section">
      <label class="profile-avatar" title="Click to upload profile picture">
        <img
          *ngIf="currentUser.profilePicture"
          [src]="currentUser.profilePicture"
          [alt]="currentUser.username + ' profile picture'"
        />

        <mat-icon *ngIf="!currentUser.profilePicture">person</mat-icon>

        <input
          type="file"
          accept="image/*"
          hidden
          (change)="onProfilePictureSelected($event)"
        />
      </label>

      <div class="profile-info">
        <h2 class="username">{{ currentUser.username }}</h2>

        <div *ngIf="!isEditingBio">
          <p class="bio" *ngIf="bioText; else emptyBio">
            {{ bioText }}
          </p>

          <ng-template #emptyBio>
            <p class="bio empty-bio">No bio yet. Add one!</p>
          </ng-template>

          <button class="small-btn" type="button" (click)="startEditingBio()">
            Edit Bio
          </button>
        </div>

        <div *ngIf="isEditingBio" class="bio-editor">
          <textarea
            [(ngModel)]="bioText"
            rows="3"
            placeholder="Write something about yourself..."
          ></textarea>

          <div class="bio-actions">
            <button class="small-btn" type="button" (click)="saveBio()">
              Save
            </button>

            <button class="small-btn secondary" type="button" (click)="cancelEditingBio()">
              Cancel
            </button>
          </div>
        </div>

        <p class="save-message" *ngIf="saveMessage">
          {{ saveMessage }}
        </p>
      </div>
    </div>

    <div class="friends-section">
      <h3 class="section-label">friends</h3>

      <div class="friends-list">
        <div class="friend-avatar" *ngFor="let friend of mockFriends">
          <img [src]="friend.avatar" [alt]="friend.username">
        </div>

        <a routerLink="/friends" class="friend-avatar more" title="Go to friends page">
          <mat-icon>arrow_forward</mat-icon>
        </a>
      </div>
    </div>
  </header>

  <hr class="divider">

  <section class="library-section">
    <h2 class="section-title">my library</h2>

    <div class="horizontal-scroll" *ngIf="(lists$ | async) as lists">
      <div class="list-card" *ngFor="let list of lists">
        <h3 class="list-name">{{ list.name }}</h3>

        <div class="book-grid">
          <div
            class="book-square"
            *ngFor="let book of list.books | slice:0:4"
            [style.backgroundImage]="book.coverPhoto ? 'url(' + book.coverPhoto + ')' : 'none'"
            style="background-size: cover; background-position: center;">
          </div>

          <div
            class="book-square empty"
            *ngFor="let i of [1,2,3,4] | slice:0:(4 - list.books.length)">
          </div>
        </div>
      </div>

      <p *ngIf="lists.length === 0" class="empty-msg">
        No lists found in the library.
      </p>
    </div>
  </section>

  <hr class="divider">

  <section class="recent-reads-section">
    <h2 class="section-title">recent reads</h2>

    <div class="horizontal-scroll">
      <div class="recent-read-item" *ngFor="let read of mockRecentReads">
        <img
          *ngIf="read.coverUrl"
          [src]="read.coverUrl"
          class="book-spine-img"
          style="width: 30px; height: 40px; object-fit: cover; border-radius: 2px;">

        <div *ngIf="!read.coverUrl" class="book-spine"></div>

        <span class="read-title">{{ read.title }}</span>
      </div>
    </div>
  </section>
</div>
