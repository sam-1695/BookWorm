<mat-toolbar class="header-toolbar">
  <!-- Brand Logo/Text -->
  <a routerLink="/explore" class="premium-brand">
    Book Worm
  </a>

  <span class="spacer"></span>
  
  <!-- Only show logout button if logged in -->
  <ng-container *ngIf="currentUser$ | async">
    <button class="premium-logout-btn" type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </ng-container>

  <!-- Show login button if logged out -->
  <ng-container *ngIf="!(currentUser$ | async)">
    <a routerLink="/login" class="premium-login-btn">
      <mat-icon>login</mat-icon>
      <span>Login</span>
    </a>
  </ng-container>
</mat-toolbar>
