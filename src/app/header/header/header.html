<mat-toolbar class="header">
  <a routerLink="/explore" class="brand">
    Book Worm
  </a>

  <span class="spacer"></span>

  <ng-container *ngIf="currentUser$ | async as currentUser; else loggedOutLinks">
    <a routerLink="/explore" mat-button>Explore</a>
    <a routerLink="/library" mat-button>Library</a>
    <a routerLink="/friends" mat-button>Friends</a>
    <a routerLink="/profile" mat-button>Profile</a>
    <button mat-raised-button color="primary" type="button" (click)="logout()">
      Logout
    </button>
  </ng-container>

  <ng-template #loggedOutLinks>
    <a routerLink="/explore" mat-button>Explore</a>
    <a routerLink="/login" mat-raised-button color="primary">Login</a>
  </ng-template>
</mat-toolbar>
