<mat-accordion *ngIf="(books$ | async) as books">
    <mat-expansion-panel *ngFor="let book of books">
        <mat-expansion-panel-header>
            <mat-panel-title>{{ book.title }}</mat-panel-title>
            <mat-panel-description>{{ book.author }}</mat-panel-description>
        </mat-expansion-panel-header>
        <div class="book-content" style="display: flex; gap: 1rem; align-items: flex-start;">
            <img *ngIf="book.coverPhoto" [src]="book.coverPhoto" [alt]="book.title" style="max-width: 150px; border-radius: 4px;">
            <p>{{ book.description }}</p>
        </div>
        <mat-action-row>
            <a mat-button [routerLink]="['/edit', book.id]">EDIT</a>
            <button mat-button color="warn" (click)="onDelete(book.id)">DELETE</button>
        </mat-action-row>
    </mat-expansion-panel>

    <p *ngIf="books.length === 0">No books added yet!</p>
</mat-accordion>
